<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maria Spectrum</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="appShell">
      <section class="controlPanel" aria-labelledby="app-title">
        <div class="frequencyControl">
          <label class="frequencyLabel" for="frequencySlider">
            Συχνότητα f =
            <span id="frequencyValue" class="frequencyValue">420 THz</span>
          </label>
          <input
            id="frequencySlider"
            type="range"
            min="0"
            max="1000"
            step="1"
            value="560"
            aria-describedby="frequencyValue"
          />
          <div
            id="spectrumTicks"
            class="spectrumTicks"
            aria-hidden="true"
          ></div>
        </div>
      </section>

      <section class="contentPanel" aria-labelledby="content-title">
        <div class="contentIntro">
          <section class="sceneLayout" aria-labelledby="content-title">
            <aside class="sceneEdge sceneEdgeSource" aria-label="Πηγή ακτινοβολίας">
              <div class="sceneObject">
                <img
                  class="sceneImage"
                  src="images/source.png"
                  alt="Πηγή ακτινοβολίας"
                />
              </div>
            </aside>

            <section class="sceneStage" aria-labelledby="content-title">
              <div class="stageSurface">
                <div class="stageCopy">
                  <p class="eyebrow">Πεδίο διάδοσης</p>
                  <h2 id="content-title">Κεντρική περιοχή απεικόνισης</h2>
                  <p>
                    Ο χώρος αυτός προορίζεται για το plot ή το animation της
                    ακτινοβολίας και παραμένει ουδέτερος ως προς την τεχνολογία
                    υλοποίησης.
                  </p>
                </div>
              </div>
            </section>

            <aside class="sceneEdge sceneEdgeSensor" aria-label="Αισθητήρας">
              <div class="sceneObject">
                <img class="sceneImage" src="images/sensor.png" alt="Αισθητήρας" />
              </div>
            </aside>
          </section>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
