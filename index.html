<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maria Spectrum</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="appShell">
      <section class="contentPanel" aria-labelledby="content-title">
        <div class="contentIntro">
          <section class="sceneLayout" aria-labelledby="content-title">
            <aside class="sceneEdge sceneEdgeSource" aria-label="Πηγή ακτινοβολίας">
              <div class="sceneObject sceneObjectWithSwitch">
                <div class="sourceImageWrap">
                  <label class="powerSwitch" aria-label="On off">
                    <input class="powerSwitchInput" type="checkbox" />
                    <span class="powerSwitchTrack" aria-hidden="true">
                      <span class="powerSwitchText powerSwitchTextOn">ON</span>
                      <span class="powerSwitchText powerSwitchTextOff">OFF</span>
                      <span class="powerSwitchThumb"></span>
                    </span>
                  </label>
                  <img
                    class="sceneImage"
                    src="images/source.png"
                    alt="Πηγή ακτινοβολίας"
                  />
                </div>
                <div class="sourceIntensityControl">
                  <label class="sourceIntensityLabel" for="intensitySlider">
                    Ένταση I =
                    <span id="intensityValue" class="sourceIntensityValue">50%</span>
                  </label>
                  <input
                    id="intensitySlider"
                    type="range"
                    min="10"
                    max="100"
                    step="1"
                    value="50"
                    aria-describedby="intensityValue"
                  />
                </div>
              </div>
            </aside>

            <section class="sceneStage" aria-label="Πεδίο διάδοσης">
              <canvas
                id="waveCanvas"
                class="waveCanvas"
                data-radiation-model="wave"
                aria-hidden="true"
              ></canvas>
            </section>

            <aside class="sceneEdge sceneEdgeSensor" aria-label="Αισθητήρας">
              <div class="sceneObject">
                <img class="sceneImage" src="images/sensor.png" alt="Αισθητήρας" />
              </div>
            </aside>
          </section>
        </div>
      </section>

      <section class="controlPanel" aria-labelledby="app-title">
        <div class="frequencyControl">
          <label class="frequencyLabel" for="frequencySlider">
            Συχνότητα f =
            <span id="frequencyValue" class="frequencyValue">420 THz</span>
          </label>
          <input
            id="frequencySlider"
            type="range"
            min="0"
            max="1000"
            step="1"
            value="560"
            aria-describedby="frequencyValue"
          />
          <div
            id="spectrumTicks"
            class="spectrumTicks"
            aria-hidden="true"
          ></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
